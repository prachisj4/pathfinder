version: "3.9"

services:
  backend:
    build: ./backend
    container_name: pathfinder-backend
    ports:
      - "5000:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pathfinder-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: pathfinder-network
